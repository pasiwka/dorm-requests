<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="icon" type="image/png" href="../img/Logo.png">

    <title>Панель админа | CampusNet</title>
</head>
<body class="page--admin">

<div class="grainient-bg"></div>
    <div class="admin">
        <div class="input-group search-wrapper">

            <input type="search" class="input-group__field search" id="search" placeholder=" ">
            <label for="search" class="input-group__label"><p class="search_p">Поиск </p></label>
        </div>
        <div class="table-container">
            <div class="table-wrapper">
            <h1>Заявки корпуса "Силикаты"</h1>
                <div class="status-filter">
                    <button class="status-filter-btn active" data-status="all">Все</button>
                    <button class="status-filter-btn" data-status="pending">В ожидании</button>
                    <button class="status-filter-btn" data-status="approved">Принята</button>
                    <button class="status-filter-btn" data-status="rejected">Отклонена</button>
                    <button class="status-filter-btn" data-status="done">Выполнена</button>
                </div>
            <td>
                <select class="table-select">
                    <option value="all" selected>Все корпуса</option>
                    <option value="Силикаты">Силикаты</option>
                    <option value="Крест">Крест</option>
                    <option value="Временное">Временное</option>
                </select>
            </td>
            </div>
        <table class="requests-table">
            <thead>
            <tr class="requests-table__head">
                <th>Студент</th>
                <th>Категория</th>
                <th>Описание</th>
                <th>Комната</th>
                <th>Время</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        </div>
    </div>

    </div>
<script src="../js/grainient.js"></script>
    <script src="../js/scriptAdmin.js" defer></script>
</body>
</html>
