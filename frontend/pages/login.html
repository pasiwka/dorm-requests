<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <title>Вход в систему заявок | CampusNet</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏠%3C/text%3E%3C/svg%3E">
</head>
<body>
<header class="header">
    <div class="container_1">
        <div class="logo">
            <img src="img/Logo.svg" alt="CampusNet" class="logo-img">
            <span class="logo-text">CampusNet</span>
        </div>
    </div>
</header>
<main class="login">
    <form class="container" id="loginForm">
        <div class="stepper">
            <div class="step active"></div>
            <div class="line"></div>
            <div class="step"></div>
            <div class="line"></div>
            <div class="step"></div>
        </div>
        <h1>Вход в систему заявок</h1>

        <div class="notification" id="emailNotification">
            <div class="notification-content">
                <span class="notification-icon"><img src="img/Icon.png" alt=""></span>
                <span class="notification-text">Все, что вам нужно — это номер телефона, привязанный к общежитию.</span>
            </div>
            <button class="notification-close" id="closeNotification"><img src="img/Vector.png" alt=""></button>
        </div>

        <div class="input-wrapper">
            <input
                    type="tel"
                    name="phone"
                    id="phone"
                    class="auth-input"
                    placeholder=" "
                    required
                    pattern="[0-9]{11}"
                    title="Введите 11 цифр номера телефона"
            >
            <label for="phone" class="floating-label">Номер телефона</label>
        </div>

        <div class="input-wrapper">
            <input
                    type="password"
                    name="password"
                    id="password"
                    class="auth-input"
                    placeholder=" "
                    required
                    minlength="6"
            >
            <label for="password" class="floating-label">Пароль</label>
        </div>

        <div id="errorMessage" class="error-message" style="display: none; color: #ef4444; font-size: 14px; margin-top: 10px; text-align: center;"></div>

        <button type="submit" class="auth-btn">
            <span>Вход</span>
        </button>
    </form>
</main>
<script src="../js/scriptLogin.js" defer></script>
</body>
</html>
