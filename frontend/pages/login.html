<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <title>Вход в систему заявок | CampusNet</title>
</head>
<body>
    <header class="header">
        <div class="container_1">
            <div class="logo">
        <img src="/frontend/pages/img/Logo.svg" alt="CampusNet" class="logo-img">
        <span class="logo-text">CampusNet</span></div>
        </div>
    </header>
    <main>
        <form action="/api/auth/login" method="POST" class="container" id="loginForm">
            <div class="stepper">
                <div class="step active"></div>
                <div class="line"></div>
                <div class="step"></div>
                <div class="line"></div>
                <div class="step"></div>
            </div>
            <h1>Вход в систему заявок</h1>
                <div class="notification" id="emailNotification">
                    <div class="notification-content">
                        <span class="notification-icon"><img src="/frontend/pages/img/Icon.png" alt=""></span>
                        <span class="notification-text">Все, что вам нужно — это номер телефона, привязанный к общежитию.</span>
                    </div>
                    <button class="notification-close" id="closeNotification"><img src="/frontend/pages/img/Vector.png" alt=""></button>
                </div>

            <div class="input-wrapper">
                <input
                        type="tel"
                        name="phone"
                        id="phone"
                        class="auth-input"
                        placeholder=" "
                        required
                        pattern="[0-9]{11}"
                        title="Введите 11 цифр номера телефона"
                >
                <label for="phone" class="floating-label">Номер телефона</label>
            </div>

            <div class="input-wrapper">
                <input
                        type="password"
                        name="password"
                        id="password"
                        class="auth-input"
                        placeholder=" "
                        required
                        minlength="6"
                >
                <label for="password" class="floating-label">Пароль</label>
            </div>

                <button type="submit" class="auth-btn">
                    <span>Вход</span>
                </button>
        </form>
        </main>
    <script src="/frontend/js/scriptLogin.js" async defer></script>
</body>
</html>
