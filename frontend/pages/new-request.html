<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <title>Новая заявка | CampusNet</title>
</head>
<body >

<div class="grainient-bg"></div>
<header class="header">
    <div class="header__container">
        <div class="logo">
            <img src="/frontend/pages/img/Logo.svg" alt="CampusNet" class="logo__image">
            <span class="logo__text">CampusNet</span></div>

    </div>
</header>
<main>
    <form class="container" id="newRequestForm">
        <div class="stepper">
            <div class="stepper__step"></div>
            <div class="stepper__line"></div>
            <div class="stepper__step active"></div>
            <div class="stepper__line"></div>
            <div class="stepper__step"></div>
        </div>
        <div class="request__section">
        <h1>Новая заявка</h1>
        <p class="request__description">Выбери категорию — мы отправим специалиста в твою комнату</p>
        <p>Твоя комната: <span id="roomDisplay">Корпус Силикатары, 123</span> <button class="button--primary change">[изменить]</button></p>
            <label class="request__category rad-label">
                <input type="radio" name="category" value="5" class="rad-input" checked>
                <div class="rad-design"></div>
                <div class="rad-design_text">Сантехник</div>
                <div class="rad-text"><p class="request__description description">Течет кран, засор, бачок</p></div>
            </label>

            <label class="request__category rad-label">
                <input type="radio" name="category" value="4" class="rad-input">
                <div class="rad-design"></div>
                <div class="rad-design_text">Электрик</div>
                <div class="rad-text"><p class="request__description description">Свет не работает, розетка, проводка</p></div>
            </label>

            <label class="request__category rad-label">
                <input type="radio" name="category" value="3" class="rad-input">
                <div class="rad-design"></div>
                <div class="rad-design_text">Мебель</div>
                <div class="rad-text"><p class="request__description description">Сломалась кровать, стул, шкаф</p></div>
            </label>

        <h1>Подробное описание</h1>
        <label><p class="request__description">Напиши, что именно случилось. Чем подробнее — тем быстрее поможем.</p></label>
        <textarea id="message" name="message"  class="request__textarea"  rows="4" cols="30" placeholder="Например: &quot;Капает вода из трубы под раковиной. Нужно срочно починить, потому что заливает соседей снизу&quot;"></textarea>

        <button type="submit" class="button--primary" id="buttonAdded">
            <span>Отправить Заявку</span>
        </button>
            </div>
    </form>
</main>
<script src="../js/grainient.js"></script>
<script src="../js/scriptNewRequest.js" defer></script>
</body>
</html>
