<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <title>Новая заявка | CampusNet</title>
</head>
<body>
<header class="header">
    <div class="container_1">
        <div class="logo">
            <img src="/frontend/pages/img/Logo.svg" alt="CampusNet" class="logo-img">
            <span class="logo-text">CampusNet</span></div>
        <div class="stepper">
            <div class="step"></div>
            <div class="line"></div>
            <div class="step active"></div>
            <div class="line"></div>
            <div class="step"></div>
        </div>
    </div>
</header>
<main>
    <form action="/api/auth/login" method="POST" class="container" id="loginForm">
        <h1>Новая заявка</h1>
        <p class="paleTest">Выбери категорию — мы отправим специалиста в твою комнату</p>
        <p>Твоя комната: <span id="roomDisplay">Корпус Силикатары, 123</span> <button class="edit-room-inline">[изменить]</button></p>

        <label class="titleLabel">
            <input type="checkbox" value="coding" checked >Сантехник
            <p class="paleTest">Течет кран, засор, бачок</p>
        </label>

        <label class="titleLabel">
            <input type="checkbox" value="coding">Электрик
            <p class="paleTest">Свет не работает, розетка, проводка</p>
        </label>

        <label class="titleLabel">
            <input type="checkbox" value="coding">Мебель
            <p class="paleTest">Сломалась кровать, стул, шкаф</p>
        </label>

        <h1>Подробное описание</h1>
        <label><p class="paleTest">Напиши, что именно случилось. Чем подробнее — тем быстрее поможем.</p></label>
        <textarea id="message" name="message" rows="4" cols="30" placeholder="Например: &quot;Капает вода из трубы под раковиной. Нужно срочно починить, потому что заливает соседей снизу&quot;"></textarea>

        <button type="submit" class="auth-btn ">
            <span>Отправить Заявку <img src="/frontend/pages/img/Vector_arrow.png" alt=""></span>
        </button>
    </form>
</main>
</body>
</html>
