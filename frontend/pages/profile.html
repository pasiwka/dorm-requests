<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../styles/main.css">
    <title>Заполнение профиля | CampusNet</title>
</head>
<body>

<div class="grainient-bg"></div>
<header class="header">
    <div class="header__container">
        <div class="logo">
            <img src="/frontend/pages/img/Logo.svg" alt="CampusNet" class="logo__image">
            <span class="logo__text">CampusNet</span></div>
    </div>
</header>
<main>
    <form action="/api/auth/login" method="POST" class="container" id="loginForm">
        <div class="stepper">
            <div class="stepper__step"></div>
            <div class="stepper__line"></div>
            <div class="stepper__step"></div>
            <div class="stepper__line"></div>
            <div class="stepper__step active"></div>
        </div>

        <h1>Заполнение профиля</h1>
        <p class="request__description profile">Укажи данные проживания. Это займет пару минут. Нужен только номер комнаты и корпус.</p>
        <div><input type="checkbox">Я соглашаюсь с правилами проживания и обработкой
            заявок</div>


        <div class="request__section">

            <h1>Данные проживания</h1>
        <div class="input-group  profile__input">
            <label for="name">Имя</label>
            <input type="text" class="input-group__field profile__input" id="name" placeholder="Введите имя">
        </div>
        <div class="input-group">
            <label for="surname">Фамилия</label>
            <input type="text" class="input-group__field" id="surname" placeholder="Введите фамилию">
        </div>
        <div class="input-row">

            <div class="input-group">
                <input type="text" class="input-group__field" id="building" placeholder=" ">
                <label for="building" class="input-group__label">Корпус</label>
            </div>

            <div class="input-group">
                <input type="text" class="input-group__field" id="room" placeholder=" ">
                <label for="room" class="input-group__label">Комната</label>
            </div>

        </div>
        <div>
        <button type="submit" class="button--primary">
            <span>Сохранить</span>
        </button>
        <button type="submit" class="button--primary">
            <span>Назад</span>
        </button>
        </div>

        </div>
    </form>
</main>
<script src="../js/grainient.js"></script>
<script src="../js/scriptLogin.js" async defer></script>
</body>
</html>
